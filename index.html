<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MacBros</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .progress-circle { transition: stroke-dashoffset 0.6s ease; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">

  <!-- Header -->
  <header class="bg-white shadow-sm px-4 py-4 flex items-center justify-between sticky top-0 z-10">
    <div class="flex items-center gap-3">
      <h1 class="text-2xl font-bold text-blue-600">MacBros</h1>
    </div>
    <button onclick="showPage('settings')" class="text-gray-600 hover:text-blue-600">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
    </button>
  </header>

  <!-- Bottom Nav -->
  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 flex text-xs font-medium z-50">
    <button onclick="showPage('dashboard')" class="flex-1 py-3 text-center text-blue-600 border-b-2 border-blue-600">Today</button>
    <button onclick="showPage('log')" class="flex-1 py-3 text-center text-gray-600">Log</button>
    <button onclick="showPage('progress')" class="flex-1 py-3 text-center text-gray-600">Progress</button>
    <button onclick="showPage('history')" class="flex-1 py-3 text-center text-gray-600">History</button>
  </nav>

  <!-- Dashboard / Today Page -->
  <div id="page-dashboard" class="page pt-4 px-4 pb-24">
    <div class="text-center mb-6">
      <div class="text-5xl font-bold" id="daily-cals-consumed">0</div>
      <div class="text-sm text-gray-500"> / <span id="daily-cals-target">3286</span> kcal</div>
      <div class="text-xs text-gray-400 mt-1">Calories</div>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-8">
      <div class="bg-white rounded-2xl p-4 shadow-sm text-center">
        <svg class="w-24 h-24 mx-auto" viewBox="0 0 120 120">
          <circle cx="60" cy="60" r="50" fill="none" stroke="#e5e7eb" stroke-width="12"></circle>
          <circle id="protein-progress" cx="60" cy="60" r="50" fill="none" stroke="#3b82f6" stroke-width="12" stroke-dasharray="314" stroke-dashoffset="314" stroke-linecap="round" transform="rotate(-90 60 60)"></circle>
        </svg>
        <div class="mt-2">
          <div class="font-semibold" id="protein-g">0g</div>
          <div class="text-sm text-gray-500">Protein <span id="protein-pct">0%</span></div>
        </div>
      </div>
      <div class="bg-white rounded-2xl p-4 shadow-sm text-center">
        <svg class="w-24 h-24 mx-auto" viewBox="0 0 120 120">
          <circle cx="60" cy="60" r="50" fill="none" stroke="#e5e7eb" stroke-width="12"></circle>
          <circle id="carbs-progress" cx="60" cy="60" r="50" fill="none" stroke="#10b981" stroke-width="12" stroke-dasharray="314" stroke-dashoffset="314" stroke-linecap="round" transform="rotate(-90 60 60)"></circle>
        </svg>
        <div class="mt-2">
          <div class="font-semibold" id="carbs-g">0g</div>
          <div class="text-sm text-gray-500">Carbs <span id="carbs-pct">0%</span></div>
        </div>
      </div>
      <div class="bg-white rounded-2xl p-4 shadow-sm text-center">
        <svg class="w-24 h-24 mx-auto" viewBox="0 0 120 120">
          <circle cx="60" cy="60" r="50" fill="none" stroke="#e5e7eb" stroke-width="12"></circle>
          <circle id="fats-progress" cx="60" cy="60" r="50" fill="none" stroke="#f59e0b" stroke-width="12" stroke-dasharray="314" stroke-dashoffset="314" stroke-linecap="round" transform="rotate(-90 60 60)"></circle>
        </svg>
        <div class="mt-2">
          <div class="font-semibold" id="fats-g">0g</div>
          <div class="text-sm text-gray-500">Fats <span id="fats-pct">0%</span></div>
        </div>
      </div>
      <div class="bg-white rounded-2xl p-4 shadow-sm text-center">
        <div class="w-24 h-24 mx-auto bg-purple-100 rounded-full flex items-center justify-center border-8 border-purple-200">
          <div class="text-center">
            <div class="font-semibold text-purple-700" id="sugar-g">0g</div>
            <div class="text-xs text-purple-600">Sugar</div>
          </div>
        </div>
        <div class="mt-2 text-sm text-gray-500">Limit <span id="sugar-pct">0%</span></div>
      </div>
    </div>

    <div class="bg-white rounded-2xl p-4 shadow-sm">
      <h3 class="font-semibold mb-3">Today's Log</h3>
      <div id="today-log" class="space-y-3"></div>
    </div>
  </div>

  <!-- Log Food Page (simplified, same as before but styled) -->
  <div id="page-log" class="page hidden pt-4 px-4 pb-24">
    <input id="food-search" type="text" placeholder="Search food..." class="w-full bg-white border border-gray-300 rounded-lg px-4 py-3 focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
    <button onclick="searchFood()" class="mt-3 w-full bg-blue-600 text-white py-3 rounded-lg font-medium">Search</button>
    <div id="search-results" class="mt-4 space-y-3"></div>

    <!-- Presets and manual entry - keep similar, but clean cards -->
    <!-- ... (paste your previous log section here, but wrap in bg-white rounded-2xl p-4 shadow-sm) ... -->
  </div>

  <!-- Progress Page - New: Weight tracking + graph -->
  <div id="page-progress" class="page hidden pt-4 px-4 pb-24">
    <h2 class="text-xl font-bold mb-4">Progress</h2>
    
    <div class="bg-white rounded-2xl p-6 shadow-sm mb-6">
      <h3 class="font-semibold mb-2">Log Weight</h3>
      <div class="flex gap-4">
        <input id="weight-log" type="number" step="0.1" placeholder="Current weight (lbs)" class="flex-1 border border-gray-300 rounded-lg px-4 py-3">
        <button onclick="logWeight()" class="bg-blue-600 text-white px-6 py-3 rounded-lg font-medium">Log</button>
      </div>
    </div>

    <div class="bg-white rounded-2xl p-4 shadow-sm">
      <h3 class="font-semibold mb-3">Weight Trend</h3>
      <canvas id="weight-chart" class="w-full h-64"></canvas>
      <div id="latest-weight" class="text-center mt-4 text-gray-600">No weight data yet</div>
    </div>
  </div>

  <!-- History / Weekly (keep or merge) -->
  <div id="page-history" class="page hidden pt-4 px-4 pb-24">
    <!-- Your weekly chart here, styled clean -->
  </div>

  <!-- Settings / Profile -->
  <div id="page-settings" class="page hidden pt-4 px-4 pb-24">
    <!-- Your onboarding fields + sliders, clean inputs -->
  </div>

  <script>
    // Core logic same as before (profile, logs, targets, renderDashboard, etc.)
    // Add weight tracking
    let weights = JSON.parse(localStorage.getItem('macbros_weights')) || [];

    function logWeight() {
      const val = parseFloat(document.getElementById('weight-log').value);
      if (!val) return alert('Enter a weight');
      const entry = { date: new Date().toISOString().split('T')[0], weight: val };
      weights.push(entry);
      localStorage.setItem('macbros_weights', JSON.stringify(weights));
      renderProgress();
      document.getElementById('weight-log').value = '';
      alert('Weight logged!');
    }

    let weightChart = null;
    function renderProgress() {
      const ctx = document.getElementById('weight-chart').getContext('2d');
      const dates = weights.map(w => w.date);
      const vals = weights.map(w => w.weight);

      if (weightChart) weightChart.destroy();
      weightChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: dates,
          datasets: [{
            label: 'Weight (lbs)',
            data: vals,
            borderColor: '#3b82f6',
            tension: 0.3,
            fill: false
          }]
        },
        options: { responsive: true, scales: { y: { beginAtZero: false } } }
      });

      if (weights.length > 0) {
        document.getElementById('latest-weight').textContent = `Latest: ${weights[weights.length-1].weight} lbs (${weights[weights.length-1].date})`;
      }
    }

    // Call renderProgress() in init + when showing page
    function showPage(page) {
      // ... existing ...
      if (page === 'progress') renderProgress();
    }

    // Init: load weights, etc.
    window.onload = () => {
      // your initApp()
      renderProgress();
    };

    // Keep your other functions (calculateTargets, renderDashboard, add food, etc.)
    // Just update colors/classes for sleek look (e.g., blue-600 buttons, gray-50 bg)
  </script>
</body>
</html>
